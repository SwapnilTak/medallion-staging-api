services:
  - type: web
    name: medallion-staging-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        value: change-me-to-a-strong-secret   # ← change this before deploying
    plan: free
